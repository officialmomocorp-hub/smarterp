version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: smarterp-db
    restart: always
    environment:
      POSTGRES_DB: smarterp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: smarterp-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:${DB_PASSWORD:-mypassword}@database:5432/smarterp?schema=public"
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh}
    depends_on:
      - database
    volumes:
      - ./server/uploads:/app/uploads

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smarterp-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
